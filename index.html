<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر براند الإلكتروني</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-950 dark:text-gray-100 flex flex-col min-h-screen transition-colors duration-300">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 dark:from-blue-900 dark:to-slate-900 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide">🛒 متجر براند الإلكتروني</h1>
        </div>
    </header>

    <div class="flex-grow">
        <main class="container mx-auto px-4 py-12 max-w-4xl">
            <!-- صندوق طلب الباقة الرئيسي -->
            <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl p-8 border border-gray-100 dark:border-gray-800 transition-colors duration-300">
                <h2 class="text-3xl font-bold text-center text-gray-800 dark:text-gray-100 mb-8">احصل على باقتك الرقمية فوراً</h2>
                
                <!-- شبكة الخيارات الرئيسية -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">1. نوع الشريحة</label>
                        <select id="carrier-select" onchange="updatePrice()" class="w-full p-3 border border-gray-300 dark:border-gray-700 rounded-xl focus:outline-none bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-gray-100"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">2. مدة الباقة</label>
                        <select id="duration-select" onchange="updatePrice()" class="w-full p-3 border border-gray-300 dark:border-gray-700 rounded-xl focus:outline-none bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-gray-100">
                            <option value="month_1">شهر واحد</option>
                            <option value="month_3">3 شهور</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">3. نوع الشريحة المفضل</label>
                        <select id="type-select" onchange="toggleLocationField()" class="w-full p-3 border border-gray-300 dark:border-gray-700 rounded-xl focus:outline-none bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-gray-100">
                            <option value="physical">شريحة تقليدية (Physical SIM)</option>
                            <option value="esim">شريحة إلكترونية (eSIM)</option>
                        </select>
                    </div>
                </div>

                <!-- حقل مكان التواجد (يظهر فقط عند اختيار شريحة تقليدية) -->
                <div id="location-container" class="mb-8 block">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">4. مكان تواجدك (للتوصيل)</label>
                    <select id="location-select" class="w-full p-3 border border-gray-300 dark:border-gray-700 rounded-xl focus:outline-none bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-gray-100">
                        <option value="البريج">البريج</option>
                        <option value="التفاح">التفاح</option>
                        <option value="الشيخ رضوان">الشيخ رضوان</option>
                        <option value="الزيتون">الزيتون</option>
                        <option value="الشاطئ">الشاطئ</option>
                        <option value="القرارة">القرارة</option>
                        <option value="المغازي">المغازي</option>
                        <option value="النصر">النصر</option>
                        <option value="النصيرات">النصيرات</option>
                        <option value="بيت لاهيا">بيت لاهيا</option>
                        <option value="جباليا">جباليا</option>
                        <option value="خانيونس">خانيونس</option>
                        <option value="دير البلح">دير البلح</option>
                        <option value="مدينة حمد">مدينة حمد</option>
                    </select>
                </div>

                <div class="bg-blue-50 dark:bg-blue-950/40 rounded-xl p-6 text-center border border-blue-100 dark:border-blue-900/50 my-8 transition-colors duration-300">
                    <p class="text-gray-600 dark:text-gray-400 text-lg mb-1">السعر الإجمالي</p>
                    <div class="text-4xl font-black text-blue-600 dark:text-blue-400 mb-4"><span id="price-display">0</span> ₪</div>
                    <button onclick="sendToWhatsApp()" class="w-full md:w-auto bg-green-500 hover:bg-green-600 dark:bg-green-600 dark:hover:bg-green-700 text-white font-bold text-lg px-12 py-3 rounded-xl shadow-lg cursor-pointer transform transition active:scale-95">
                        اشترِ الآن عبر واتساب 📲
                    </button>
                </div>
            </div>

            <!-- قسم طرق الدفع الجديد بالصور والأيقونات المحددة -->
            <div class="mt-12 bg-white dark:bg-gray-900 rounded-2xl shadow-md p-8 border border-gray-100 dark:border-gray-800 text-center transition-colors duration-300">
                <h3 class="text-lg font-bold text-gray-700 dark:text-gray-300 mb-6 flex items-center justify-center gap-2">
                    💳 طرق الدفع المتاحة والمقبولة لدينا
                </h3>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-6 items-center justify-center">
                    
                    <!-- محفظة باينانس -->
                    <div class="flex flex-col items-center justify-center p-3 rounded-2xl border border-gray-100 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-800/40 hover:shadow-sm transition">
                        <img src="1000010318.jpg" alt="Binance" class="w-16 h-16 rounded-xl object-cover shadow-sm mb-2">
                        <span class="text-xs font-bold text-gray-600 dark:text-gray-400">محفظة باينانس</span>
                    </div>

                    <!-- بنك فلسطين -->
                    <div class="flex flex-col items-center justify-center p-3 rounded-2xl border border-gray-100 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-800/40 hover:shadow-sm transition">
                        <img src="1000010319.jpg" alt="Bank of Palestine" class="w-16 h-16 rounded-xl object-cover shadow-sm mb-2">
                        <span class="text-xs font-bold text-gray-600 dark:text-gray-400">بنك فلسطين</span>
                    </div>

                    <!-- جوال بي -->
                    <div class="flex flex-col items-center justify-center p-3 rounded-2xl border border-gray-100 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-800/40 hover:shadow-sm transition">
                        <img src="1000010321.jpg" alt="Jawwal Pay" class="w-16 h-16 rounded-xl object-cover shadow-sm mb-2">
                        <span class="text-xs font-bold text-gray-600 dark:text-gray-400">جوال بي</span>
                    </div>

                    <!-- بال بي -->
                    <div class="flex flex-col items-center justify-center p-3 rounded-2xl border border-gray-100 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-800/40 hover:shadow-sm transition">
                        <img src="1000010325.jpg" alt="PalPay" class="w-16 h-16 rounded-xl object-cover shadow-sm mb-2">
                        <span class="text-xs font-bold text-gray-600 dark:text-gray-400">بال بي</span>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <footer class="bg-gray-900 text-gray-300 py-8 border-t border-gray-800 mt-auto dark:bg-black">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <p class="font-bold text-lg text-white">متجر براند الإلكتروني</p>
                <p class="text-xs text-gray-500 mt-1">جميع الحقوق محفوظة &copy; 2026</p>
            </div>
            <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 items-center text-sm">
                <span class="font-semibold text-gray-400">للتواصل والدعم الفني المباشر:</span>
                <a href="https://wa.me/972599783984" target="_blank" class="text-green-400 hover:text-green-300 font-medium transition">🟢 واتساب: 00972599783984</a>
                <a href="tel:00972599783984" class="text-blue-400 hover:text-blue-300 font-medium transition">📞 اتصل بنا: 00972599783984</a>
            </div>
        </div>
    </footer>

    <script>
        let initialData = {
            "هوت موبايل": { month_1: 50, month_3: 125 }, "بارتنر": { month_1: 50, month_3: 125 },
            "بيليفون": { month_1: 50, month_3: 135 }, "019": { month_1: 50, month_3: 135 },
            "رامي ليفي": { month_1: 60, month_3: 135 }, "ويكوم": { month_1: 50, month_3: 120 },
            "سيلكوم": { month_1: 50, month_3: 120 }, "الوها": { month_1: 50, month_3: 130 }
        };

        let storeData = JSON.parse(localStorage.getItem('brand_store_prices')) || initialData;

        function initApp() {
            const carrierSelect = document.getElementById('carrier-select');
            carrierSelect.innerHTML = '';
            for (let carrier in storeData) {
                let option = document.createElement('option');
                option.value = carrier; option.textContent = carrier;
                carrierSelect.appendChild(option);
            }
            updatePrice();
            toggleLocationField(); // للتأكد من الحالة الصحيحة عند الإقلاع
        }

        function updatePrice() {
            const carrier = document.getElementById('carrier-select').value;
            const duration = document.getElementById('duration-select').value;
            if (storeData[carrier]) {
                document.getElementById('price-display').textContent = storeData[carrier][duration];
            }
        }

        // دالة إخفاء وإظهار حقل مكان التواجد
        function toggleLocationField() {
            const typeSelect = document.getElementById('type-select');
            const locationContainer = document.getElementById('location-container');
            
            if (typeSelect.value === 'physical') {
                locationContainer.style.display = 'block';
            } else {
                locationContainer.style.display = 'none';
            }
            updatePrice();
        }

        function sendToWhatsApp() {
            const carrier = document.getElementById('carrier-select').value;
            const duration = document.getElementById('duration-select').options[document.getElementById('duration-select').selectedIndex].text;
            const typeValue = document.getElementById('type-select').value;
            const typeText = document.getElementById('type-select').options[document.getElementById('type-select').selectedIndex].text;
            const price = document.getElementById('price-display').textContent;
            const phoneNumber = "972599783984"; 

            let locationText = "";
            // إذا كانت الشريحة تقليدية نضيف مكان التواجد للرسالة
            if (typeValue === 'physical') {
                const locationSelect = document.getElementById('location-select');
                locationText = `📍 مكان التواجد: ${locationSelect.value}\n`;
            }

            const message = `مرحباً، أود طلب الباقة التالية من متجر براند:\n\n📱 نوع الشريحة: ${carrier}\n⏳ المدة: ${duration}\n🏷️ نوع الشريحة: ${typeText}\n${locationText}💰 السعر الإجمالي: ${price} ₪\n\nبانتظار تأكيد الطلب وطريقة الدفع.`;
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
        }

        window.addEventListener('storage', () => {
            storeData = JSON.parse(localStorage.getItem('brand_store_prices')) || initialData;
            updatePrice();
        });

        initApp();
    </script>
</body>
</html>
