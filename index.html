<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر براند الإلكتروني</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide">🛒 متجر براند الإلكتروني</h1>
        </div>
    </header>

    <div class="flex-grow">
        <main class="container mx-auto px-4 py-12 max-w-4xl">
            <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
                <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">احصل على باقتك الرقمية فوراً</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">1. نوع الشريحة</label>
                        <select id="carrier-select" onchange="updatePrice()" class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none bg-gray-50"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">2. مدة الباقة</label>
                        <select id="duration-select" onchange="updatePrice()" class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none bg-gray-50">
                            <option value="month_1">شهر واحد</option>
                            <option value="month_3">3 شهور</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">3. نوع الشريحة المفضل</label>
                        <select id="type-select" onchange="updatePrice()" class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none bg-gray-50">
                            <option value="physical">شريحة تقليدية (Physical SIM)</option>
                            <option value="esim">شريحة إلكترونية (eSIM)</option>
                        </select>
                    </div>
                </div>

                <div class="bg-blue-50 rounded-xl p-6 text-center border border-blue-100 my-8">
                    <p class="text-gray-600 text-lg mb-1">السعر الإجمالي</p>
                    <div class="text-4xl font-black text-blue-600 mb-4"><span id="price-display">0</span> ₪</div>
                    <button onclick="sendToWhatsApp()" class="w-full md:w-auto bg-green-500 hover:bg-green-600 text-white font-bold text-lg px-12 py-3 rounded-xl shadow-lg cursor-pointer">
                        اشترِ الآن عبر واتساب 📲
                    </button>
                </div>
            </div>
        </main>
    </div>

    <footer class="bg-gray-900 text-gray-300 py-8 border-t border-gray-800 mt-auto">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <p class="font-bold text-lg text-white">متجر براند الإلكتروني</p>
                <p class="text-xs text-gray-500 mt-1">جميع الحقوق محفوظة &copy; 2026</p>
            </div>
            <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 items-center text-sm">
                <a href="https://wa.me/972599783984" target="_blank" class="text-green-400 font-medium">🟢 واتساب: 00972599783984</a>
                <a href="tel:00972599783984" class="text-blue-400 font-medium">📞 اتصل بنا: 00972599783984</a>
            </div>
        </div>
    </footer>

    <script>
        let initialData = {
            "هوت موبايل": { month_1: 50, month_3: 125 }, "بارتنر": { month_1: 50, month_3: 125 },
            "بيليفون": { month_1: 50, month_3: 135 }, "019": { month_1: 50, month_3: 135 },
            "رامي ليفي": { month_1: 60, month_3: 135 }, "ويكوم": { month_1: 50, month_3: 120 },
            "سيلكوم": { month_1: 50, month_3: 120 }, "الوها": { month_1: 50, month_3: 130 }
        };

        let storeData = JSON.parse(localStorage.getItem('brand_store_prices')) || initialData;

        function initApp() {
            const carrierSelect = document.getElementById('carrier-select');
            carrierSelect.innerHTML = '';
            for (let carrier in storeData) {
                let option = document.createElement('option');
                option.value = carrier; option.textContent = carrier;
                carrierSelect.appendChild(option);
            }
            updatePrice();
        }

        function updatePrice() {
            const carrier = document.getElementById('carrier-select').value;
            const duration = document.getElementById('duration-select').value;
            if (storeData[carrier]) {
                document.getElementById('price-display').textContent = storeData[carrier][duration];
            }
        }

        function sendToWhatsApp() {
            const carrier = document.getElementById('carrier-select').value;
            const duration = document.getElementById('duration-select').options[document.getElementById('duration-select').selectedIndex].text;
            const type = document.getElementById('type-select').options[document.getElementById('type-select').selectedIndex].text;
            const price = document.getElementById('price-display').textContent;
            const phoneNumber = "972599783984"; 

            const message = `مرحباً، أود طلب الباقة التالية من متجر براند:\n\n📱 نوع الشريحة: ${carrier}\n⏳ المدة: ${duration}\n🏷️ نوع الشريحة: ${type}\n💰 السعر الإجمالي: ${price} ₪\n\nبانتظار تأكيد الطلب.`;
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
        }

        // تحديث البيانات تلقائياً لو قام الأدمن بتغييرها من نفس الجهاز
        window.addEventListener('storage', () => {
            storeData = JSON.parse(localStorage.getItem('brand_store_prices')) || initialData;
            updatePrice();
        });

        initApp();
    </script>
</body>
</html>
